<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aymen & Basia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #000; font-family: Georgia, serif; overflow: hidden; }
    #app { position: fixed; inset: 0; }
    #splash { position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease; overflow: hidden; }
    #splash .glow { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, #e5091410 0%, transparent 70%); pointer-events: none; }
    .heart { position: absolute; color: #e50914; font-size: 14px; opacity: 0; animation: floatHeart 6s ease-in infinite; pointer-events: none; }
    @keyframes floatHeart { 0% { opacity: 0; transform: translateY(100vh) scale(0.5); } 20% { opacity: 0.6; } 80% { opacity: 0.3; } 100% { opacity: 0; transform: translateY(-100px) scale(1.2); } }
    #splash .logo { margin-bottom: 28px; z-index: 1; }
    #splash .logo svg { width: 80px; height: 22px; }
    #splash h1 { color: #fff; font-size: clamp(36px,10vw,72px); font-weight: bold; letter-spacing: 6px; line-height: 1; text-align: center; animation: fadeUp 0.9s cubic-bezier(0.34,1.3,0.64,1) 0.15s both; z-index: 1; }
    #splash .amp { display: block; color: #e50914; font-size: 0.5em; letter-spacing: 12px; margin: 8px 0; }
    #splash .tagline { color: #ffffff44; font-style: italic; font-size: 13px; letter-spacing: 3px; margin-top: 14px; margin-bottom: 48px; animation: fadeUp 0.9s ease 0.5s both; z-index: 1; }
    #splash .btn-watch { background: #e50914; color: #fff; border: none; padding: 14px 48px; font-size: 14px; letter-spacing: 4px; cursor: pointer; font-family: Georgia, serif; border-radius: 2px; animation: fadeUp 0.8s ease 0.7s both; transition: background 0.2s; z-index: 1; }
    #splash .btn-watch:hover { background: #c40812; }
    #splash .line { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, #e50914, transparent); opacity: 0.5; animation: fadeIn 1.5s ease 1s both; }
    #chapters { position: absolute; inset: 0; background: #141414; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 24px; overflow-y: auto; }
    #chapters .heading { text-align: center; margin-bottom: 36px; animation: fadeUp 0.5s ease both; }
    #chapters .heading small { color: #ffffff44; font-size: 11px; letter-spacing: 4px; display: block; margin-bottom: 10px; }
    #chapters .heading h2 { color: #fff; font-size: 24px; font-weight: 400; }
    .cards { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; margin-bottom: 36px; }
    .card { cursor: pointer; text-align: center; animation: fadeUp 0.5s ease both; transition: transform 0.25s ease; }
    .card:hover { transform: translateY(-10px) scale(1.05); }
    .card-inner { width: 145px; height: 205px; border-radius: 10px; overflow: hidden; position: relative; border: 2px solid transparent; box-shadow: 0 4px 24px #000000aa; transition: border 0.25s, box-shadow 0.25s; }
    .card:hover .card-inner { border-color: var(--color); }
    .card-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--color) 0%, transparent 55%); }
    .card-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 12px 16px; text-align: center; }
    .card-label strong { color: #fff; font-size: 17px; display: block; text-shadow: 0 2px 8px #000; }
    .card-label em { color: #ffffffaa; font-size: 11px; display: block; margin-top: 3px; }
    .btn-message { background: none; border: 1px solid #e5091455; color: #e5091499; padding: 10px 32px; cursor: pointer; font-size: 13px; letter-spacing: 3px; border-radius: 2px; font-family: Georgia, serif; animation: fadeUp 0.6s ease 0.5s both; transition: background 0.2s, color 0.2s; }
    .btn-message:hover { background: #e5091415; color: #e50914; }
    #gallery { position: absolute; inset: 0; background: #0a0a0a; display: none; flex-direction: column; overflow-y: auto; }
    .gallery-header { position: sticky; top: 0; z-index: 50; background: rgba(10,10,10,0.92); backdrop-filter: blur(12px); padding: 13px 18px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #ffffff08; }
    .btn-back { background: #ffffff12; border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .btn-back:hover { background: #ffffff22; }
    .gallery-header h2 { color: #fff; font-size: 18px; font-weight: normal; }
    .gallery-header p { color: #ffffff44; font-size: 11px; font-style: italic; margin-top: 2px; }
    .dot { margin-left: auto; width: 8px; height: 8px; border-radius: 50%; }
    .hero-wrap { height: 300px; position: relative; overflow: hidden; cursor: pointer; flex-shrink: 0; }
    .hero-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hero-grad { position: absolute; inset: 0; background: linear-gradient(to top, #0a0a0a 0%, transparent 55%); pointer-events: none; }
    .hero-badge { position: absolute; bottom: 16px; left: 18px; color: #fff; font-size: 10px; padding: 3px 10px; border-radius: 2px; letter-spacing: 2px; font-family: Georgia, serif; }
    .grid { padding: 14px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .grid-item { height: 160px; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
    .grid-item:hover { transform: scale(1.03); }
    .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gallery-footer { text-align: center; padding: 10px 0 40px; font-size: 11px; letter-spacing: 4px; font-family: Georgia, serif; }
    #credits { position: absolute; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 48px 24px 40px; }
    .stars-wrap { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--dur) ease-in-out var(--delay) infinite; }
    .credits-photo { width: 155px; height: 195px; border-radius: 14px; overflow: hidden; border: 2px solid #e5091433; box-shadow: 0 0 50px #e5091422; margin-bottom: 28px; flex-shrink: 0; animation: fadeUp 1s cubic-bezier(0.34,1.2,0.64,1) both; }
    .credits-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .credits-title { text-align: center; margin-bottom: 24px; animation: fadeUp 0.9s ease 0.2s both; }
    .credits-title small { color: #e50914aa; font-size: 10px; letter-spacing: 5px; display: block; margin-bottom: 8px; }
    .credits-title h2 { color: #fff; font-size: 22px; font-weight: 400; }
    .credits-table { display: grid; grid-template-columns: auto auto; gap: 8px 28px; margin-bottom: 28px; animation: fadeUp 1s ease 0.4s both; }
    .credits-table .key { color: #808080; font-size: 13px; text-align: right; }
    .credits-table .val { color: #e5e5e5; font-size: 13px; }
    .message-box { max-width: 290px; text-align: center; padding: 20px 22px; border: 1px solid #ffffff0a; border-radius: 8px; background: #ffffff04; animation: fadeUp 1.1s ease 0.6s both; margin-bottom: 28px; }
    .message-box p { color: #e5e5e5; font-size: 14px; line-height: 1.8; font-style: italic; white-space: pre-line; margin: 0; }
    .credits-back { background: none; border: 1px solid #e5091455; color: #e5091499; padding: 10px 28px; cursor: pointer; font-size: 12px; letter-spacing: 3px; border-radius: 2px; font-family: Georgia, serif; animation: fadeUp 1.1s ease 0.8s both; transition: background 0.2s, color 0.2s; }
    .credits-back:hover { background: #e5091415; color: #e50914; }
    #lightbox { position: fixed; inset: 0; background: #000000f0; display: none; align-items: center; justify-content: center; z-index: 300; cursor: pointer; }
    #lightbox img { max-width: 94vw; max-height: 90vh; object-fit: contain; border-radius: 8px; display: block; }
    .lb-arrow { position: fixed; top: 50%; transform: translateY(-50%); background: #ffffff22; border: none; color: #fff; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 20px; z-index: 310; display: flex; align-items: center; justify-content: center; }
    #lb-prev { left: 10px; }
    #lb-next { right: 10px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes twinkle { 0%,100% { opacity: 0.15; } 50% { opacity: 0.7; } }
  </style>
</head>
<body>
<div id="app">
  <div id="splash">
    <div class="glow"></div>
    <div class="logo">
      <svg viewBox="0 0 111 30" fill="#e50914"><path d="M105.06 0l-11.44 30.02L82.18 0H69.93v30.02L58.49 0H46.44l-9.96 26.09L27.06 0H14.82L0 30h12.26l8.82-22.98L29.9 30h11.88l8.82-23.12L59.42 30H71.7V7.16l10.88 22.84h11.26V7.16L104.72 30H111L95.94 0z"/></svg>
    </div>
    <h1>AYMEN<span class="amp">&amp;</span>BASIA</h1>
    <p class="tagline">An original series</p>
    <button class="btn-watch" onclick="show('chapters')">WATCH NOW</button>
    <div class="line"></div>
  </div>

  <div id="chapters">
    <div class="heading">
      <small>AYMEN &amp; BASIA</small>
      <h2>Choose a chapter</h2>
    </div>
    <div class="cards" id="cards-container"></div>
    <button class="btn-message" onclick="show('credits')">&#9829; &nbsp; A message for you</button>
  </div>

  <div id="gallery">
    <div class="gallery-header">
      <button class="btn-back" onclick="show('chapters')">&#8592;</button>
      <div>
        <h2 id="gal-title"></h2>
        <p id="gal-sub"></p>
      </div>
      <div class="dot" id="gal-dot"></div>
    </div>
    <div class="hero-wrap" id="gal-hero" onclick="openLightbox(0)">
      <div class="hero-grad"></div>
      <span class="hero-badge" id="gal-badge"></span>
    </div>
    <div class="grid" id="gal-grid"></div>
    <div class="gallery-footer" id="gal-footer"></div>
  </div>

  <div id="credits">
    <div class="stars-wrap" id="stars"></div>
    <div class="credits-photo" id="credits-photo"></div>
    <div class="credits-title">
      <small>THE END</small>
      <h2>Aymen &amp; Basia</h2>
    </div>
    <div class="credits-table" id="credits-table"></div>
    <div class="message-box"><p id="credits-msg"></p></div>
    <button class="credits-back" onclick="show('chapters')">&#8592; Back</button>
  </div>

  <div id="lightbox" onclick="closeLightbox()">
    <img id="lb-img" src="" alt="" />
    <button class="lb-arrow" id="lb-prev" onclick="event.stopPropagation();moveLightbox(-1)">&#8592;</button>
    <button class="lb-arrow" id="lb-next" onclick="event.stopPropagation();moveLightbox(1)">&#8594;</button>
  </div>
</div>
<script>
var CHAPTERS = [
  {
    label: "1 Month",
    subtitle: "Where it all began",
    color: "#e50914",
    photos: [
      "https://i.ibb.co/gbTgKkfq/IMG-0860.jpg",
      "https://i.ibb.co/xqpvGLVP/IMG-0863.jpg",
      "https://i.ibb.co/ffDZvCW/IMG-0888.jpg",
      "https://i.ibb.co/tPnpjRsY/IMG-0911.jpg",
      "https://i.ibb.co/PsBbNy9Z/IMG-0915.jpg",
      "https://i.ibb.co/8LrptxtJ/5ba6110e-c248-4072-8a26-513f64d6f268.jpg",
      "https://i.ibb.co/GSCGS0Z/IMG-1149.jpg",
      "https://i.ibb.co/GQvJqTWT/IMG-1151.jpg",
      "https://i.ibb.co/XrH8sRK6/IMG-1159.jpg",
      "https://i.ibb.co/Wpt5hN4z/IMG-1161.jpg",
      "https://i.ibb.co/jPzpFFbf/IMG-1298.jpg",
      "https://i.ibb.co/bM48dwJ7/IMG-1312.jpg",
      "https://i.ibb.co/yF2wZjxF/IMG-1350.jpg"
    ]
  },
  {
    label: "3 Months",
    subtitle: "Getting deeper",
    color: "#ff6b35",
    photos: [
      "https://i.ibb.co/LX3GzCYK/2a6b69df-f173-47ba-9fef-d29ac78debe3.jpg",
      "https://i.ibb.co/r22hBzpR/caba4b3b-14f4-408f-ac90-bb9c7d951638.jpg",
      "https://i.ibb.co/GfwZmVhF/4c72ff38-3d97-402b-a9f6-f116fb18ba5f.jpg",
      "https://i.ibb.co/7xHpP2FT/b980e59f-5ffe-4eb8-8710-019f94320ad6.jpg",
      "https://i.ibb.co/tpG9bff8/a699b0f1-0cab-4599-b881-24e536847085.jpg",
      "https://i.ibb.co/B5D68m2C/dbf8efce-97ff-44ad-a828-54a6adfcaa88.jpg",
      "https://i.ibb.co/gbbcqtNx/a2aeb717-a42b-4d27-9e18-65f556c55e47.jpg",
      "https://i.ibb.co/277BLCnR/34f383e7-1cd5-4be3-a0c7-b225051979fb.jpg",
      "https://i.ibb.co/d4S9nPcJ/44ad5872-0264-48e1-b7ad-f77550bf068e.jpg",
      "https://i.ibb.co/qLpXVJYj/f0edfaae-6885-4fe8-a6ba-6d2617356df8.jpg",
      "https://i.ibb.co/23vFcFC0/247cb22c-636d-4615-a05c-d99ca0ac7f6c.jpg"
    ]
  },
  {
    label: "6 Months",
    subtitle: "You & me, always",
    color: "#c41870",
    photos: [
      "https://i.postimg.cc/t7vTr5zc/IMG-3529.jpg",
      "https://i.postimg.cc/Dmw0dD1b/IMG-3588.jpg",
      "https://i.postimg.cc/BX8vRKhy/IMG-3861.jpg",
      "https://i.postimg.cc/Z05nFg6J/IMG-3936.jpg",
      "https://i.postimg.cc/VdSN2C73/IMG-3945.jpg",
      "https://i.postimg.cc/m1krLzTD/IMG-3949.jpg"
    ]
  }
];

var CONFIG = {
  couplePhoto: "https://i.ibb.co/ksvqg5Kf/A39036-EF-5-AE7-4715-9-EF8-CE7683-FD7-B94.png",
  message: "Every moment with you feels like\nthe beginning of something beautiful.\n\nHappy anniversary, my love.",
  boyfriendName: "Aymen",
  girlfriendName: "Basia"
};

var currentChapter = null;
var lbPhotos = [];
var lbIndex = 0;

function show(screen) {
  var screens = ['splash','chapters','gallery','credits'];
  for (var i = 0; i < screens.length; i++) {
    document.getElementById(screens[i]).style.display = 'none';
  }
  document.getElementById(screen).style.display = 'flex';
  if (screen === 'chapters') buildChapters();
  if (screen === 'gallery') buildGallery();
  if (screen === 'credits') buildCredits();
}

function buildChapters() {
  var c = document.getElementById('cards-container');
  c.innerHTML = '';
  for (var i = 0; i < CHAPTERS.length; i++) {
    (function(ch, idx) {
      var card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (idx * 0.1 + 0.1) + 's';
      card.onclick = function() { currentChapter = ch; show('gallery'); };
      card.innerHTML = '<div class="card-inner" style="--color:' + ch.color + '"><img class="card-img" src="' + ch.photos[0] + '" alt="" /><div class="card-overlay" style="--color:' + ch.color + '"></div><div class="card-label"><strong>' + ch.label + '</strong><em>' + ch.subtitle + '</em></div></div>';
      c.appendChild(card);
    })(CHAPTERS[i], i);
  }
}

function buildGallery() {
  var ch = currentChapter;
  document.getElementById('gal-title').textContent = ch.label;
  document.getElementById('gal-sub').textContent = ch.subtitle;
  var dot = document.getElementById('gal-dot');
  dot.style.background = ch.color;
  dot.style.boxShadow = '0 0 10px ' + ch.color;
  var badge = document.getElementById('gal-badge');
  badge.textContent = ch.label.toUpperCase();
  badge.style.background = ch.color;
  var hero = document.getElementById('gal-hero');
  var old = hero.querySelectorAll('img');
  for (var i = 0; i < old.length; i++) old[i].remove();
  var heroImg = document.createElement('img');
  heroImg.src = ch.photos[0];
  hero.insertBefore(heroImg, hero.firstChild);
  var grid = document.getElementById('gal-grid');
  grid.innerHTML = '';
  for (var j = 1; j < ch.photos.length; j++) {
    (function(src, idx) {
      var item = document.createElement('div');
      item.className = 'grid-item';
      item.onclick = function() { openLightbox(idx + 1); };
      item.innerHTML = '<img src="' + src + '" alt="" />';
      grid.appendChild(item);
    })(ch.photos[j], j - 1);
  }
  document.getElementById('gal-footer').innerHTML = '<span style="color:' + ch.color + '77">&#9829; AYMEN &amp; BASIA &#9829;</span>';
  lbPhotos = ch.photos;
}

function openLightbox(idx) {
  if (!lbPhotos[idx]) return;
  lbIndex = idx;
  document.getElementById('lb-img').src = lbPhotos[idx];
  document.getElementById('lb-prev').style.display = idx > 0 ? 'flex' : 'none';
  document.getElementById('lb-next').style.display = idx < lbPhotos.length - 1 ? 'flex' : 'none';
  document.getElementById('lightbox').style.display = 'flex';
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}

function moveLightbox(dir) {
  var newIdx = lbIndex + dir;
  if (newIdx < 0 || newIdx >= lbPhotos.length) return;
  lbIndex = newIdx;
  document.getElementById('lb-img').src = lbPhotos[newIdx];
  document.getElementById('lb-prev').style.display = newIdx > 0 ? 'flex' : 'none';
  document.getElementById('lb-next').style.display = newIdx < lbPhotos.length - 1 ? 'flex' : 'none';
}

function buildCredits() {
  var sw = document.getElementById('stars');
  sw.innerHTML = '';
  for (var i = 0; i < 80; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var size = Math.random() * 2 + 1;
    s.style.cssText = 'left:' + (Math.random()*100) + '%;top:' + (Math.random()*100) + '%;width:' + size + 'px;height:' + size + 'px;--dur:' + (2+Math.random()*4) + 's;--delay:' + (Math.random()*4) + 's;opacity:' + (Math.random()*0.5+0.1) + ';';
    sw.appendChild(s);
  }
  var cp = document.getElementById('credits-photo');
  cp.innerHTML = '<img src="' + CONFIG.couplePhoto + '" alt="" />';
  var rows = [
    ['Directed by','God'],
    ['Written by','Fate & destiny'],
    ['Boyfriend', CONFIG.boyfriendName],
    ['Girlfriend', CONFIG.girlfriendName],
    ['Produced by','Time & love'],
    ['Soundtrack','Your laugh'],
    ['Special FX','Your smile']
  ];
  var html = '';
  for (var i = 0; i < rows.length; i++) {
    html += '<span class="key">' + rows[i][0] + '</span><span class="val">' + rows[i][1] + '</span>';
  }
  document.getElementById('credits-table').innerHTML = html;
  document.getElementById('credits-msg').textContent = CONFIG.message;
}

// Floating hearts on splash
function spawnHearts() {
  var splash = document.getElementById('splash');
  setInterval(function() {
    var h = document.createElement('div');
    h.className = 'heart';
    h.textContent = Math.random() > 0.5 ? '\u2665' : '\u2764';
    h.style.left = (Math.random() * 100) + '%';
    h.style.animationDuration = (4 + Math.random() * 4) + 's';
    h.style.animationDelay = (Math.random() * 2) + 's';
    h.style.fontSize = (10 + Math.random() * 16) + 'px';
    splash.appendChild(h);
    setTimeout(function() { if (h.parentNode) h.parentNode.removeChild(h); }, 8000);
  }, 800);
}

show('splash');
spawnHearts();
</script>
</body>
</html>
